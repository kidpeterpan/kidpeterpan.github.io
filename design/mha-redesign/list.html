<!doctype html>
<html lang="en" data-theme="light" data-accent="gold" data-intensity="bold">

		<title>Books · kidpeterpan.github.io</title>
		<script>
			(function () {
				try {
					var t = localStorage.getItem("mha-theme");
					if (t === "dark" || t === "light")
						document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>
		<link rel="stylesheet" href="mha.css" />
	</head>
	<body data-screen-label="Section list">
		<div class="top-stripe"></div>

		<header class="site-header">

						<a href="list.html">book</a>

				</div>
			</div>

							<span class="idx">01</span>

								<span class="post-meta">
									<span class="tag">book</span>
								</span>
							</span>
							<span class="date">Jun 7, 2026</span>
						</a>
					</li>
				</ul>
			</section>
		</main>

		<footer class="site-footer">
			<div class="halftone"></div>
			<div class="wrap">
				<p class="sig">© 2026 <b>kidpeterpan</b> — built with 💚</p>
